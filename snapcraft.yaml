name: dupont
base: core22
version: "1.3.0"
summary: A native desktop wallpaper app for Bing WOTD and Microsoft Spotlight
description: |
  Dupont is a native Linux desktop wallpaper app that fetches daily wallpapers
  from Bing Wallpaper of the Day and Microsoft Spotlight. Supports multiple
  languages and markets.

grade: stable
confinement: strict

architectures:
  - amd64

parts:
  dupont:
    plugin: rust
    source: .
    source-type: local
    build-packages:
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - pkg-config
      - libssl-dev
    rust-channel: stable
    override-build: |
      snapcraftctl build
      install -Dm755 target/release/dupont $SNAPCRAFT_PART_INSTALL/bin/dupont
      install -Dm644 data/io.github.parkiyong.dupont.desktop $SNAPCRAFT_PART_INSTALL/usr/share/applications/io.github.parkiyong.dupont.desktop
      install -Dm644 data/icons/scalable/io.github.parkiyong.dupont.svg $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps/io.github.parkiyong.dupont.svg

apps:
  dupont:
    command: bin/dupont
    desktop: usr/share/applications/io.github.parkiyong.dupont.desktop
    environment:
      DISPLAY: ":0"
      WAYLAND_SOCKET: "$WAYLAND_DISPLAY"
      XDG_RUNTIME_DIR: "$XDG_RUNTIME_DIR"
    plugs:
      - desktop
      - opengl
      - wayland
      - x11
      - network
      - network-observe
      - removable-media