  <!-- Monitor stand -->
  <rect x="48" y="88" width="32" height="6" rx="2" ry="2" fill="#1a5fb4"/>
  <rect x="38" y="94" width="52" height="5" rx="3" ry="3" fill="#1a5fb4"/>
